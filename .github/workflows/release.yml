name: Release Binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  schedule:
    - cron: "0 4 * * *"

jobs:
  release_meta:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      make_latest: ${{ steps.meta.outputs.make_latest }}
      is_nightly: ${{ steps.meta.outputs.is_nightly }}
      body: ${{ steps.meta.outputs.body }}
    steps:
      - name: Resolve tag and release mode
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "release_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
            echo "is_nightly=false" >> "$GITHUB_OUTPUT"
            {
              echo "body<<EOF"
              echo "Automated release for tag ${GITHUB_REF_NAME}."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "tag_name=nightly" >> "$GITHUB_OUTPUT"
            echo "release_name=Nightly" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
            echo "is_nightly=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<EOF"
              echo "Automated nightly release for commit ${GITHUB_SHA}."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

  build_linux_and_windows:
    name: Build ${{ matrix.asset_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: things3-linux-amd64
            executable: things3
          - target: aarch64-unknown-linux-gnu
            asset_name: things3-linux-arm64
            executable: things3
          - target: x86_64-pc-windows-gnu
            asset_name: things3-windows-x86
            executable: things3.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install AArch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Windows linker
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.executable }}" "dist/${{ matrix.asset_name }}${{ matrix.target == 'x86_64-pc-windows-gnu' && '.exe' || '' }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  build_darwin:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            asset_name: things3-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare asset
        run: |
          mkdir -p dist
          cp target/release/things3 "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/*

  publish_release:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - release_meta
      - build_linux_and_windows
      - build_darwin
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Move nightly tag to current commit
        if: needs.release_meta.outputs.is_nightly == 'true'
        run: |
          git tag -f nightly "${GITHUB_SHA}"
          git push origin refs/tags/nightly --force

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_meta.outputs.tag_name }}
          name: ${{ needs.release_meta.outputs.release_name }}
          prerelease: ${{ needs.release_meta.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.release_meta.outputs.make_latest == 'true' }}
          body: ${{ needs.release_meta.outputs.body }}
          files: dist/*
          fail_on_unmatched_files: true

  publish_crate:
    name: Publish crate to crates.io
    runs-on: ubuntu-latest
    needs:
      - release_meta
    if: needs.release_meta.outputs.is_nightly == 'false'
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release_meta.outputs.tag_name }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked

      - name: Skip publish (token not configured)
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "CRATES_IO_TOKEN is not configured; skipping crates.io publish"
